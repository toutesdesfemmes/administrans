name: Test, build and deploy to administrans.fr

on:
  push:
    branches:
      - main
      # - $default-branch  # Set a branch name to trigger deployment
  pull_request:

concurrency:
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # eslint@10 requires Node >= 22.13.0 (or 20.19.x); use 22.13.0 to satisfy both
          node-version: '22.13.0'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install


      - name: Build
        run: yarn build
        env:
          VITE_PLAUSIBLE_TRACKING_DOMAIN: administrans.fr
          VITE_PLAUSIBLE_URL: https://stats.administrans.fr
          VITE_REDIRECT_DOMAIN: administrans.fr

      - name: Disable jekyll
        run: touch dist/.nojekyll

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        if: github.ref == 'refs/heads/main'
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages # The branch the action should deploy to.
          folder: dist # The folder the action should deploy.


