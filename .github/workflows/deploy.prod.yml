name: Test, build and deploy to administrans.fr

on:
  push:
    branches:
      - main
      # - $default-branch  # Set a branch name to trigger deployment
  pull_request:

concurrency: 
  group: ${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    concurrency:
      group: ${{ github.workflow }}-${{ github.ref }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '16'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install


      - name: Build
        run: yarn build
        env:
          VITE_UMAMI_SRC: https://in.administrans.fr/u.js
          VITE_UMAMI_WEBSITE_ID: 4bc91646-7545-4186-b634-991de539575c
          VITE_UMAMI_DOMAINS: administrans.fr
          VITE_REDIRECT_DOMAIN: administrans.fr

      - name: Disable jekyll
        run: touch dist/.nojekyll

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        if: github.ref == 'refs/heads/main'
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          branch: gh-pages # The branch the action should deploy to.
          folder: dist # The folder the action should deploy.
          